name: devcontainer-default build

on:
  push:
    paths:
      - "devcontainer-default/**"
    branches:
      - "master"
    tags:
      - "v*"
  pull_request:
    paths:
      - "devcontainer-default/**"
    branches:
      - "master"

jobs:
  # define job to build and publish docker image
  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    # run only when code is compiling and tests are passing
    runs-on: ubuntu-latest

    # steps to perform in job
    steps:
      - name: Checkout (GitHub)
        uses: actions/checkout@v2
      - name: Compute container version (dir content hash)
        id: ver
        # `HEAD:devcontainer-default` is the git tree object of the directory — a
        # content hash that changes only when files under it change, so the
        # published version bumps only when the container's data actually does.
        run: echo "sha=$(git rev-parse 'HEAD:devcontainer-default' | cut -c1-12)" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v1
      - name: Setup Docker buildx for multi-architecture builds
        uses: docker/setup-buildx-action@v1
        with:
          use: true
      - name: Login to Github Packages
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and run dev container task
        uses: devcontainers/ci@v0.2
        with:
          subFolder: devcontainer-default
          imageName: ghcr.io/${{ github.actor }}/devcontainer-default
          imageTag: latest,${{ steps.ver.outputs.sha }}
          # platform doesn't fully work yet https://github.com/devcontainers/ci/issues/151
          # platform: linux/amd64,linux/arm64
          push: always
